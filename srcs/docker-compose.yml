version: "3.3"

services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    env_file: .env
    networks:
      - mynetwork
    image: mariadb
    volumes:
      - mariadb_volume:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "$MARIADB_USER", "-p$MARIADB_USER_PWD"]
      interval: 10s
      timeout: 5s
      retries: 5

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    env_file: .env
    networks:
      - mynetwork
    image: wordpress
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - wordpress_volume:/var/www/wordpress
    restart: unless-stopped

  nginx:
    container_name: nginx
    build: ./requirements/nginx
    env_file: .env
    networks:
      - mynetwork
    image: nginx
    ports:
      - 443:443
    depends_on:
      - wordpress
    volumes:
      - wordpress_volume:/var/www/wordpress
    restart: unless-stopped

networks:
  mynetwork:

volumes:
  mariadb_volume:
    driver: local
    driver_opts: 
      device: /home/abkasmi/data/database
      type: volume
      o: bind

  wordpress_volume:
    driver: local
    driver_opts: 
      device: /home/abkasmi/data/wordpress
      type: volume
      o: bind
