version: "3.3"

services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    env_file: .env
    networks:
      - mynetwork
    image: mariadb
    volumes:
      - mariadb_volume:/var/lib/mysql
    restart: on-failure

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    env_file: .env
    networks:
      - mynetwork
    image: wordpress
    depends_on:
      - mariadb
    volumes:
      - wordpress_volume:/var/www/wordpress
    restart: on-failure

  nginx:
    container_name: nginx
    build: ./requirements/nginx
    env_file: .env
    networks:
      - mynetwork
    image: nginx
    ports:
      - 443:443
    depends_on:
      - wordpress
    volumes:
      - wordpress_volume:/var/www/wordpress
    restart: unless-stopped

networks:
  mynetwork:

volumes:
  mariadb_volume:
    driver: local
    driver_opts: 
      device: /home/abkasmi/data/database
      type: none
      o: bind

  wordpress_volume:
    driver: local
    driver_opts: 
      device: /home/abkasmi/data/wordpress
      type: none
      o: bind
