server {
    server_name abkasmi.42.fr;

    listen 443 ssl;
    listen [::]:443 ssl;

    ssl on;
    ssl_certificate		/etc/nginx/ssl/abkasmi.42.fr.crt;
	ssl_certificate_key	/etc/nginx/ssl/abkasmi.42.fr.key;

    ssl_protocols		TLSv1.2 TLSv1.3;

    auroindex on;
    root /var/www/wordpress;

    index index.php;

    location ~ \.php$ {
		include /etc/nginx/snippets/fastcgi-php.conf;
		fastcgi_pass	wordpress:9000;
	}

}